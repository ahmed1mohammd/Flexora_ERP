<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO & Search Engine Optimization Tags for Egypt Gym Staff Login -->
    <title>بوابة تسجيل الدخول الموحدة | نظام فليكسورا لإدارة الصالات</title>
    <meta name="description" content="تسجيل الدخول الموحد لمالكي صالات الجيم وموظفي الاستقبال بمصر في منصة فليكسورا V2. نظام الأتمتة والتحصيل المالي الفوري.">
    <meta name="keywords" content="تسجيل دخول جيم, لوحة تحكم جيم مصر, فليكسورا دخول, Flexora login">
    <meta name="robots" content="index, follow">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/gFwNY6cd/fav-Icon-2.png">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Oswald:wght@500;700&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bootstrap 5 RTL Grid CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap-grid.rtl.min.css" rel="stylesheet">

    <!-- SweetAlert2 Sweet Theme -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Tailwind CSS v3 via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg_main: '#0A0A0A',
                        surface: '#1A1A1A',
                        border: '#2B2B2B',
                        primary: '#E50914',
                        hover_glow: '#FF2B36',
                        text_muted: '#A3A3A3',
                        text_light: '#F5F5F5',
                    },
                    fontFamily: {
                        display: ['Oswald', 'sans-serif'],
                        primary: ['Cairo', 'Ubuntu', 'sans-serif'],
                    },
                    boxShadow: {
                        'neon-red': '0 0 20px rgba(229, 9, 20, 0.45)',
                        'neon-glow': '0 0 35px rgba(255, 43, 54, 0.65)',
                        'cyber-card': '0 4px 30px rgba(0, 0, 0, 0.8)',
                    }
                }
            }
        }
    </script>

    <!-- Centralized Premium Cyberpunk Luxury Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg min-h-screen flex flex-col justify-between">
    <!-- Interactive Mouse Spotlight Follower -->
    <div class="mouse-spotlight"></div>

    <!-- Interactive Canvas-Based Glowing Grid Background -->
    <canvas id="cyber-grid-canvas"></canvas>

    <!-- Minimal Header -->
    <header class="py-6 border-b border-border/20 backdrop-blur-md bg-bg_main/35 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center group" aria-label="الرئيسية">
                <img src="https://i.ibb.co/qF44zwks/logo1-1.png" alt="فليكسورا" style="height: 80px;" class="w-auto object-contain transition-transform duration-300 hover:scale-105 filter drop-shadow-[0_0_12px_rgba(229,9,20,0.65)]">
            </a>
            <a href="index.html" class="text-xs text-text_muted hover:text-primary transition-all flex items-center gap-1">
                <span>العودة للموقع الرئيسي</span>
                <i class="fa-solid fa-arrow-left"></i>
            </a>
        </div>
    </header>

    <!-- Unified Login Form (Glassmorphism card) -->
    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-md bg-surface/60 border border-border backdrop-blur-lg rounded-2xl p-8 shadow-cyber-card relative">
            
            <!-- Glow effect border at top -->
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-l from-primary via-hover_glow to-primary"></div>

            <div class="text-center mb-8">
                <div class="w-14 h-14 rounded-full bg-primary/10 border border-primary/30 flex items-center justify-center mx-auto mb-4 text-primary text-2xl shadow-neon-red">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1 class="text-2xl font-black text-text_light mb-2">تسجيل الدخول الموحد</h1>
                <p class="text-text_muted text-xs">متاح لمديري الصالات، المدربين، وموظفي الاستقبال</p>
            </div>

            <!-- Login form -->
            <form id="login-form" class="space-y-5">
                
                <!-- Email Input -->
                <div>
                    <label for="email" class="block text-xs font-bold text-text_light uppercase tracking-wider mb-2">البريد الإلكتروني للعمل *</label>
                    <div class="relative" dir="ltr">
                        <input type="email" id="email" required placeholder="name@gymname.com" 
                            class="w-full pl-10 pr-4 py-3 rounded-lg border border-border bg-bg_main/90 text-text_light text-sm form-glow transition-all text-right">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-text_muted">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                    </div>
                </div>

                <!-- Password Input -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="password" class="block text-xs font-bold text-text_light uppercase tracking-wider">كلمة المرور *</label>
                        <a href="#" class="text-[10px] text-primary hover:underline font-bold">نسيت كلمة المرور؟</a>
                    </div>
                    <div class="relative" dir="ltr">
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full pl-10 pr-4 py-3 rounded-lg border border-border bg-bg_main/90 text-text_light text-sm form-glow transition-all text-right">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-text_muted">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-2">
                    <button type="submit" id="submit-btn" class="w-full py-3.5 rounded-lg bg-primary hover:bg-hover_glow shadow-neon-red hover:shadow-neon-glow font-bold text-text_light text-sm tracking-wide transition-all flex items-center justify-center gap-3">
                        <span id="btn-text">تسجيل الدخول الآمن</span>
                        <i class="fa-solid fa-right-to-bracket text-sm"></i>
                    </button>
                </div>
            </form>


            <!-- Sign Up prompt -->
            <div class="mt-6 text-center text-xs">
                <span class="text-text_muted">صالتك الرياضية ليست مسجلة؟ </span>
                <a href="register.html" class="text-primary font-bold hover:text-hover_glow hover:underline transition-all">سجل الآن معنا مجاناً</a>
            </div>

        </div>
    </main>

    <!-- Footer Page Block -->
    <footer class="bg-bg_main border-t border-border/20 py-6 text-center text-xs text-text_muted">
        <p>&copy; 2026 فليكسورا لأتمتة صالات الجيم بمصر. جميع الحقوق محفوظة.</p>
        <div class="mt-2 flex items-center justify-center gap-1.5 text-[11px] text-text_muted">
            <span>تطوير وتصميم شريك التقنية:</span>
            <a href="#" class="text-primary font-bold hover:underline hover:text-hover_glow transition-all">Snap Tech</a>
        </div>
    </footer>

    <!-- Core HTTP Communication Bridge (api.js) -->
    <script src="api.js"></script>
    
    <script type="text/javascript">

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                submitBtn.disabled = true;
                btnText.textContent = 'جاري التحقق والمطابقة...';

                try {
                    // Call api.js logic
                    const response = await window.FlexoraAPI.login(email, password);
                    
                    // Show quick premium welcome alert using SweetAlert2
                    Swal.fire({
                        icon: 'success',
                        title: 'أهلاً بك مجدداً!',
                        text: `تم التحقق بنجاح. جاري توجيهك إلى لوحة تحكم: ${response.gym?.gymName || response.gym?.name || 'فليكسورا'}`,
                        showConfirmButton: false,
                        timer: 1500,
                        background: '#1A1A1A',
                        color: '#F5F5F5',
                        timerProgressBar: true
                    }).then(() => {
                        // Dynamic Redirection based on authenticated user role
                        const role = window.FlexoraAPI.getRole();
                        if (role === 'PlatformAdmin' || role === 'Platform-Owner') {
                            window.location.href = 'super-admin-dashboard/index.html';
                        } else {
                            window.location.href = 'gym-dashboard/index.html';
                        }
                    });

                } catch (error) {
                    // Grab block data or show custom 403 Frozen Alert
                    if (error.status === 403) {
                        const details = error.details || {};
                        
                        if (details.reason === 'subscription_expired') {
                            // Show dedicated highly informative Frozen Arabic SweetAlert2
                            Swal.fire({
                                icon: 'error',
                                title: 'عذراً! حساب الصالة مجمد حالياً',
                                html: `
                                    <div class="text-right space-y-3 text-sm leading-relaxed">
                                        <p class="font-semibold text-primary">تم إيقاف ميزات الربط التلقائي والـ API مؤقتاً.</p>
                                        <p class="text-xs text-text_muted">السبب: <strong>فاتورة اشتراك فليكسورا V2 مستحقة منذ ${details.daysOverdue || 14} يوماً.</strong></p>
                                        
                                        <div class="p-3 bg-red-950/20 border border-primary/30 rounded-lg text-xs text-text_light mt-2">
                                            <i class="fa-solid fa-triangle-exclamation text-primary ml-1"></i>
                                            ${details.actionRequired || 'يرجى سداد المستحقات لتجنب حذف قاعدة البيانات.'}
                                        </div>

                                        <p class="text-[11px] text-text_muted border-t border-border/40 pt-3">
                                            لإعادة التفعيل الفوري أو تقديم طلب إرجاء السداد، يرجى مراسلتنا: 
                                            <a href="mailto:${details.supportEmail}" class="text-primary hover:underline font-bold">${details.supportEmail}</a> 
                                            أو الاتصال المباشر بالدعم الفني بمصر.
                                        </p>
                                    </div>
                                `,
                                confirmButtonText: 'اتصل بفرع فليكسورا مصر',
                                showCancelButton: true,
                                cancelButtonText: 'حسناً، فهمت',
                                background: '#1A1A1A',
                                color: '#F5F5F5',
                                confirmButtonColor: '#E50914',
                                cancelButtonColor: '#2B2B2B',
                                customClass: {
                                    popup: 'border border-border'
                                }
                            }).then((result) => {
                                if (result.isConfirmed) {
                                    Swal.fire({
                                        title: 'الدعم الفني والتحصيل',
                                        text: 'يمكنك الاتصال بفرع القاهرة على رقم: 19999 لحل مشكلة التجميد فوراً.',
                                        icon: 'info',
                                        confirmButtonText: 'موافق',
                                        background: '#1A1A1A',
                                        color: '#F5F5F5',
                                        confirmButtonColor: '#E50914'
                                    });
                                }
                            });
                        } else if (details.reason === 'gym_pending_approval') {
                            // Show Gym Pending Approval alert
                            Swal.fire({
                                icon: 'warning',
                                title: 'طلبك قيد الانتظار (PENDING)',
                                text: error.message,
                                confirmButtonText: 'حسناً، بانتظار التفعيل',
                                background: '#1A1A1A',
                                color: '#F5F5F5',
                                confirmButtonColor: '#E50914'
                            });
                        } else {
                            // Generic block alert
                            Swal.fire({
                                icon: 'error',
                                title: 'حظر الدخول',
                                text: error.message,
                                confirmButtonText: 'موافق',
                                background: '#1A1A1A',
                                color: '#F5F5F5',
                                confirmButtonColor: '#E50914'
                            });
                        }
                    } else {
                        // Regular auth error (Incorrect credentials)
                        Swal.fire({
                            icon: 'error',
                            title: 'خطأ في المصادقة',
                            text: error.message || 'بيانات الدخول المدخلة غير صحيحة.',
                            confirmButtonText: 'إعادة المحاولة',
                            background: '#1A1A1A',
                            color: '#F5F5F5',
                            confirmButtonColor: '#E50914'
                        });
                    }
                } finally {
                    submitBtn.disabled = false;
                    btnText.textContent = 'تسجيل الدخول الآمن';
                }
            });

            // 4. Performance-optimized LERP-based Canvas Grid Glow
            const canvas = document.getElementById('cyber-grid-canvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                
                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();
                
                const cellSize = 40;
                const activeCells = new Map();
                
                let mouseX = -1000;
                let mouseY = -1000;
                let targetX = -1000;
                let targetY = -1000;
                let isMoving = false;
                
                window.addEventListener('mousemove', (e) => {
                    targetX = e.clientX;
                    targetY = e.clientY;
                    if (!isMoving) {
                        isMoving = true;
                        mouseX = targetX;
                        mouseY = targetY;
                        document.body.classList.add('mouse-active');
                    }
                });
                
                window.addEventListener('mouseleave', () => {
                    isMoving = false;
                    targetX = -1000;
                    targetY = -1000;
                    document.body.classList.remove('mouse-active');
                });
                
                function activateCell(col, row, intensity) {
                    const cols = Math.ceil(canvas.width / cellSize);
                    const rows = Math.ceil(canvas.height / cellSize);
                    if (col < 0 || col >= cols || row < 0 || row >= rows) return;
                    
                    const key = `${col},${row}`;
                    const current = activeCells.get(key);
                    
                    if (!current) {
                        activeCells.set(key, { col, row, opacity: intensity });
                    } else {
                        current.opacity = Math.max(current.opacity, intensity);
                    }
                }
                
                function updateGridGlow() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    if (isMoving && targetX !== -1000) {
                        const dx = targetX - mouseX;
                        const dy = targetY - mouseY;
                        
                        mouseX += dx * 0.12;
                        mouseY += dy * 0.12;
                        
                        const col = Math.floor(mouseX / cellSize);
                        const row = Math.floor(mouseY / cellSize);
                        
                        activateCell(col, row, 1.0);
                        activateCell(col - 1, row, 0.4);
                        activateCell(col + 1, row, 0.4);
                        activateCell(col, row - 1, 0.4);
                        activateCell(col, row + 1, 0.4);
                        
                        activateCell(col - 1, row - 1, 0.15);
                        activateCell(col + 1, row - 1, 0.15);
                        activateCell(col - 1, row + 1, 0.15);
                        activateCell(col + 1, row + 1, 0.15);
                    }
                    
                    activeCells.forEach((cell, key) => {
                        const x = cell.col * cellSize;
                        const y = cell.row * cellSize;
                        
                        ctx.fillStyle = `rgba(229, 9, 20, ${cell.opacity * 0.12})`;
                        ctx.fillRect(x + 1, y + 1, cellSize - 1, cellSize - 1);
                        
                        ctx.strokeStyle = `rgba(229, 9, 20, ${cell.opacity * 0.45})`;
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(x, y, cellSize, cellSize);
                        
                        cell.opacity -= 0.03;
                        if (cell.opacity <= 0) {
                            activeCells.delete(key);
                        }
                    });
                    
                    requestAnimationFrame(updateGridGlow);
                }
                requestAnimationFrame(updateGridGlow);
            }
        });
    </script>
</body>
</html>
