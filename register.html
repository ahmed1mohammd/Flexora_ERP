<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO & Search Engine Optimization Tags for Egyptian Gym Owners -->
    <title>تسجيل صالة جديدة | نظام فليكسورا لأتمتة صالات الجيم بمصر</title>

    <meta name="keywords" content="تسجيل جيم جديد, برنامج إدارة الجيم بمصر, نظام أتمتة الصالات الرياضية, فليكسورا تسجيل, Flexora register">
    <meta name="robots" content="index, follow">
 
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/gFwNY6cd/fav-Icon-2.png">
 
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Oswald:wght@500;700&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 
    <!-- Bootstrap 5 RTL Grid CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap-grid.rtl.min.css" rel="stylesheet">
 
    <!-- SweetAlert2 Sweet Theme -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
 
    <!-- Tailwind CSS v3 via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg_main: '#0A0A0A',
                        surface: '#1A1A1A',
                        border: '#2B2B2B',
                        primary: '#E50914',
                        hover_glow: '#FF2B36',
                        text_muted: '#A3A3A3',
                        text_light: '#F5F5F5',
                    },
                    fontFamily: {
                        display: ['Oswald', 'sans-serif'],
                        primary: ['Cairo', 'Ubuntu', 'sans-serif'],
                    },
                    boxShadow: {
                        'neon-red': '0 0 20px rgba(229, 9, 20, 0.45)',
                        'neon-glow': '0 0 35px rgba(255, 43, 54, 0.65)',
                        'cyber-card': '0 4px 30px rgba(0, 0, 0, 0.8)',
                    }
                }
            }
        }
    </script>
    <!-- Centralized Premium Cyberpunk Luxury Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="cyberpunk-grid min-h-screen flex flex-col justify-between">
    <!-- Interactive Mouse Spotlight Follower -->
    <div class="mouse-spotlight"></div>

    <!-- Interactive Canvas-Based Glowing Grid Background -->
    <canvas id="cyber-grid-canvas"></canvas>
 
    <!-- Top Glow Overlay -->
    <div class="absolute top-0 left-1/3 w-[600px] h-[600px] bg-primary/10 rounded-full blur-[140px] pointer-events-none -z-10"></div>
 
    <!-- Minimal Header with Logo -->
    <header class="py-6 border-b border-border/40 backdrop-blur-md bg-bg_main/60 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center group" aria-label="الرئيسية">
                <img src="https://i.ibb.co/qF44zwks/logo1-1.png" alt="فليكسورا" style="height: 75px;" class="w-auto object-contain transition-transform duration-300 hover:scale-105 filter drop-shadow-[0_0_12px_rgba(229,9,20,0.5)]">
            </a>
            <a href="index.html" class="text-xs text-text_muted hover:text-primary transition-all flex items-center gap-1">
                <span>العودة للرئيسية</span>
                <i class="fa-solid fa-arrow-left"></i>
            </a>
        </div>
    </header>
 
    <!-- Main Registration Section -->
    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="w-full max-w-2xl bg-surface/60 border border-border backdrop-blur-lg rounded-2xl p-8 sm:p-10 shadow-cyber-card relative overflow-hidden glass-card-premium">
            <!-- Luxury red gradient bar at the top -->
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-l from-primary via-hover_glow to-primary"></div>
            
            <div class="text-center mb-8">
                <h1 class="text-2xl sm:text-3xl font-black text-text_light mb-2">سجل صالتك الرياضية في فليكسورا</h1>
                <p class="text-text_muted text-xs sm:text-sm">انضم لأكثر من 120 نادي ومؤسسة لياقة بدنية تستخدم محركنا المحاسبي V2 المتكامل بمصر.</p>
            </div>
 
            <!-- Form Wrapper mapping to POST /user/register -->
            <form id="registration-form" class="space-y-6">
                <div class="row g-4">
                    
                    <!-- Gym Name -->
                    <div class="col-md-6">
                        <label for="gymName" class="block text-xs font-bold text-text_light uppercase tracking-wider mb-2">اسم الصالة الرياضية (الجيم) *</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-text_muted">
                                <i class="fa-solid fa-dumbbell"></i>
                            </span>
                            <input type="text" id="gymName" required placeholder="مثال: فليكس جيم الدقي" 
                                class="w-full pr-10 pl-4 py-3 rounded-lg border border-border bg-bg_main text-text_light text-sm form-glow transition-all">
                        </div>
                    </div>
 
                    <!-- Owner Name -->
                    <div class="col-md-6">
                        <label for="ownerName" class="block text-xs font-bold text-text_light uppercase tracking-wider mb-2">اسم المالك بالكامل *</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-text_muted">
                                <i class="fa-solid fa-user"></i>
                            </span>
                            <input type="text" id="ownerName" required placeholder="مثال: كابتن أحمد محمود" 
                                class="w-full pr-10 pl-4 py-3 rounded-lg border border-border bg-bg_main text-text_light text-sm form-glow transition-all">
                        </div>
                    </div>
 
                    <!-- Email Address -->
                    <div class="col-md-6">
                        <label for="email" class="block text-xs font-bold text-text_light uppercase tracking-wider mb-2">البريد الإلكتروني التجاري *</label>
                        <div class="relative" dir="ltr">
                            <input type="email" id="email" required placeholder="owner@gymname.com" 
                                class="w-full pl-10 pr-4 py-3 rounded-lg border border-border bg-bg_main text-text_light text-sm form-glow transition-all text-right">
                            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-text_muted">
                                <i class="fa-solid fa-envelope"></i>
                            </span>
                        </div>
                    </div>
 
                    <!-- Phone Number -->
                    <div class="col-md-6">
                        <label for="phone" class="block text-xs font-bold text-text_light uppercase tracking-wider mb-2">رقم الهاتف للتواصل المباشر *</label>
                        <div class="relative" dir="ltr">
                            <input type="tel" id="phone" required placeholder="01012345678" 
                                class="w-full pl-10 pr-4 py-3 rounded-lg border border-border bg-bg_main text-text_light text-sm form-glow transition-all text-right">
                            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-text_muted">
                                <i class="fa-solid fa-phone"></i>
                            </span>
                        </div>
                    </div>
 
                    <!-- Owner Password -->
                    <div class="col-md-6">
                        <label for="password" class="block text-xs font-bold text-text_light uppercase tracking-wider mb-2">كلمة مرور حساب المالك *</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-text_muted">
                                <i class="fa-solid fa-lock"></i>
                            </span>
                            <input type="password" id="password" required placeholder="أدخل كلمة مرور قوية" 
                                class="w-full pr-10 pl-4 py-3 rounded-lg border border-border bg-bg_main text-text_light text-sm form-glow transition-all">
                        </div>
                    </div>

                    <!-- Pricing Package Select -->
                    <div class="col-md-6">
                        <label for="planId" class="block text-xs font-bold text-text_light uppercase tracking-wider mb-2">باقة التشغيل المفضلة *</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-text_muted">
                                <i class="fa-solid fa-cubes"></i>
                            </span>
                            <select id="planId" required class="w-full pr-10 pl-4 py-3 rounded-lg border border-border bg-bg_main text-text_light text-sm form-glow transition-all appearance-none cursor-pointer">
                                <option value="" disabled selected>جاري تحميل باقات التشغيل المتاحة...</option>
                            </select>
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-text_muted pointer-events-none">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </span>
                        </div>
                    </div>

                    <!-- Commercial Registration / Gym Address -->
                    <div class="col-12">
                        <label for="address" class="block text-xs font-bold text-text_light uppercase tracking-wider mb-2">عنوان الصالة الرياضية بالتفصيل *</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-text_muted">
                                <i class="fa-solid fa-map-location-dot"></i>
                            </span>
                            <input type="text" id="address" required placeholder="مثال: 15 شارع مصدق، الدقي، الجيزة، مصر" 
                                class="w-full pr-10 pl-4 py-3 rounded-lg border border-border bg-bg_main text-text_light text-sm form-glow transition-all">
                        </div>
                    </div>
 
                    <!-- Commercial License Attachment / Promo Code -->
                    <div class="col-12">
                        <label for="promoCode" class="block text-xs font-bold text-text_light uppercase tracking-wider mb-2">كود خصم الوكيل المصري (إن وجد)</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-text_muted">
                                <i class="fa-solid fa-ticket"></i>
                            </span>
                            <input type="text" id="promoCode" placeholder="EGYPT-PROMO-2026" 
                                class="w-full pr-10 pl-4 py-3 rounded-lg border border-border bg-bg_main text-text_light text-sm form-glow transition-all">
                        </div>
                    </div>
 
                </div>
 
                <!-- Terms and conditions checkbox -->
                <div class="flex items-start gap-3 mt-4">
                    <input type="checkbox" id="agreeTerms" required class="w-4 h-4 mt-0.5 accent-primary cursor-pointer">
                    <label for="agreeTerms" class="text-xs text-text_muted leading-relaxed cursor-pointer selection:bg-primary selection:text-text_light">
                        أوافق على <a href="#" class="text-primary hover:underline font-semibold">شروط الخدمة والخصوصية</a> المعتمدة لدى منصة فليكسورا مصر وأؤكد صحة البيانات المدخلة لتسجيل الصالة.
                    </label>
                </div>
 
                <!-- Action CTA button -->
                <div class="pt-4">
                    <button type="submit" id="submit-btn" class="w-full py-4 rounded-lg bg-primary hover:bg-hover_glow shadow-neon-red hover:shadow-neon-glow font-bold text-text_light text-sm tracking-wide transition-all flex items-center justify-center gap-3">
                        <span id="btn-text">إرسال طلب التسجيل وتأكيد البيانات</span>
                        <i class="fa-solid fa-paper-plane text-sm"></i>
                    </button>
                </div>
            </form>
 
            <div class="mt-8 pt-6 border-t border-border/40 text-center">
                <span class="text-xs text-text_muted">لديك صالة مسجلة بالفعل؟ </span>
                <a href="login.html" class="text-xs text-primary font-bold hover:text-hover_glow hover:underline transition-all">تسجيل الدخول إلى البوابة الموحدة</a>
            </div>
 
        </div>
    </main>
 
    <!-- Footer Page Block -->
    <footer class="bg-bg_main border-t border-border/40 py-6 text-center text-xs text-text_muted">
        <p>&copy; 2026 فليكسورا لأتمتة صالات الجيم بمصر. جميع الحقوق محفوظة.</p>
        <div class="mt-2 flex items-center justify-center gap-1.5 text-[11px] text-text_muted">
            <span>تطوير وتصميم شريك التقنية:</span>
            <a href="#" class="text-primary font-bold hover:underline hover:text-hover_glow transition-all">Snap Tech</a>
        </div>
    </footer>
 
    <!-- Core HTTP Communication Bridge (api.js) -->
    <script src="api.js"></script>
    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', async () => {
            const form = document.getElementById('registration-form');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');

            // Dynamic plans hydration
            const loadSaasPlans = async () => {
                const planSelect = document.getElementById('planId');
                if (!planSelect) return;
                try {
                    const response = await window.FlexoraAPI.getPlans();
                    const plans = response.data?.plans || [];
                    planSelect.innerHTML = '<option value="" disabled selected>اختر باقة التشغيل...</option>';
                    plans.forEach(plan => {
                        const opt = document.createElement('option');
                        opt.value = plan.id;
                        opt.textContent = `${plan.planName} - ${plan.price} ج.م / ${plan.durationInDays} يوم (ريسبشنست: ${plan.maxReceptionists ?? 1}، كوتشز: ${plan.maxCoaches ?? 4})`;
                        planSelect.appendChild(opt);
                    });
                } catch (err) {
                    console.error('Failed to load saas plans:', err);
                    planSelect.innerHTML = '<option value="" disabled>فشل تحميل الباقات من الخادم</option>';
                }
            };
            await loadSaasPlans();
 
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
 
                // Double check agreement
                if (!document.getElementById('agreeTerms').checked) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'تنبيه',
                        text: 'يرجى الموافقة على شروط الخدمة والخصوصية للمتابعة.',
                        confirmButtonText: 'حسناً',
                        background: '#1A1A1A',
                        color: '#F5F5F5',
                        confirmButtonColor: '#E50914'
                    });
                    return;
                }
 
                // Gather input values
                const gymData = {
                    gymName: document.getElementById('gymName').value,
                    ownerName: document.getElementById('ownerName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    password: document.getElementById('password').value,
                    address: document.getElementById('address').value,
                    planId: document.getElementById('planId').value,
                    promoCode: document.getElementById('promoCode').value
                };
 
                // Disable submit button and show loading state
                submitBtn.disabled = true;
                btnText.textContent = 'جاري إرسال طلبك الآمن...';
                
                try {
                    // Call Isolated API bridge (handles direct fetch to 3000 + smart simulation mode)
                    const response = await window.FlexoraAPI.register(gymData);
                    
                    // Show premium SweetAlert2 stating PENDING status
                    Swal.fire({
                        icon: 'success',
                        title: 'طلبك قيد المراجعة الفنية!',
                        html: `
                            <div class="text-right space-y-3 text-sm">
                                <p class="font-semibold text-primary">تم تسجيل صالتك <strong>"${response.gym.name}"</strong> بنجاح!</p>
                                <p class="text-text_muted">حالة الحساب الحالية: <span class="bg-yellow-500/20 text-yellow-500 font-bold px-2 py-0.5 rounded border border-yellow-500/30 text-xs">قيد الانتظار (PENDING)</span></p>
                                <p class="text-xs leading-relaxed mt-2 text-text_light border-t border-border/30 pt-3">
                                    يقوم حالياً فريق التفتيش الفني وخدمات أتمتة الجيم في <strong>فليكسورا مصر</strong> بمراجعة المستندات للتأكد من ربط محرك المحاسبة V2 بشكل سليم. سيتم تفعيل خدماتك هاتفياً أو عبر البريد الإلكتروني خلال 24 ساعة.
                                </p>
                            </div>
                        `,
                        confirmButtonText: 'الذهاب إلى بوابة تسجيل الدخول',
                        background: '#1A1A1A',
                        color: '#F5F5F5',
                        confirmButtonColor: '#E50914',
                        customClass: {
                            popup: 'border border-border'
                        }
                    }).then((result) => {
                        // Redirect to Unified login screen
                        window.location.href = 'login.html';
                    });
 
                } catch (error) {
                    // Show error details
                    Swal.fire({
                        icon: 'error',
                        title: 'فشل إرسال طلب التسجيل',
                        text: error.message || 'حدث خطأ غير متوقع أثناء المعالجة.',
                        confirmButtonText: 'محاولة أخرى',
                        background: '#1A1A1A',
                        color: '#F5F5F5',
                        confirmButtonColor: '#E50914'
                    });
                } finally {
                    submitBtn.disabled = false;
                    btnText.textContent = 'إرسال طلب التسجيل وتأكيد البيانات';
                }
            });
 
            // 4. Performance-optimized LERP-based Canvas Grid Glow
            const canvas = document.getElementById('cyber-grid-canvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                
                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();
                
                const cellSize = 40;
                const activeCells = new Map();
                
                let mouseX = -1000;
                let mouseY = -1000;
                let targetX = -1000;
                let targetY = -1000;
                let isMoving = false;
                
                window.addEventListener('mousemove', (e) => {
                    targetX = e.clientX;
                    targetY = e.clientY;
                    if (!isMoving) {
                        isMoving = true;
                        mouseX = targetX;
                        mouseY = targetY;
                        document.body.classList.add('mouse-active');
                    }
                });
                
                window.addEventListener('mouseleave', () => {
                    isMoving = false;
                    targetX = -1000;
                    targetY = -1000;
                    document.body.classList.remove('mouse-active');
                });
                
                function activateCell(col, row, intensity) {
                    const cols = Math.ceil(canvas.width / cellSize);
                    const rows = Math.ceil(canvas.height / cellSize);
                    if (col < 0 || col >= cols || row < 0 || row >= rows) return;
                    
                    const key = `${col},${row}`;
                    const current = activeCells.get(key);
                    
                    if (!current) {
                        activeCells.set(key, { col, row, opacity: intensity });
                    } else {
                        current.opacity = Math.max(current.opacity, intensity);
                    }
                }
                
                function updateGridGlow() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    if (isMoving && targetX !== -1000) {
                        const dx = targetX - mouseX;
                        const dy = targetY - mouseY;
                        
                        mouseX += dx * 0.12;
                        mouseY += dy * 0.12;
                        
                        const col = Math.floor(mouseX / cellSize);
                        const row = Math.floor(mouseY / cellSize);
                        
                        activateCell(col, row, 1.0);
                        activateCell(col - 1, row, 0.4);
                        activateCell(col + 1, row, 0.4);
                        activateCell(col, row - 1, 0.4);
                        activateCell(col, row + 1, 0.4);
                        
                        activateCell(col - 1, row - 1, 0.15);
                        activateCell(col + 1, row - 1, 0.15);
                        activateCell(col - 1, row + 1, 0.15);
                        activateCell(col + 1, row + 1, 0.15);
                    }
                    
                    activeCells.forEach((cell, key) => {
                        const x = cell.col * cellSize;
                        const y = cell.row * cellSize;
                        
                        ctx.fillStyle = `rgba(229, 9, 20, ${cell.opacity * 0.12})`;
                        ctx.fillRect(x + 1, y + 1, cellSize - 1, cellSize - 1);
                        
                        ctx.strokeStyle = `rgba(229, 9, 20, ${cell.opacity * 0.45})`;
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(x, y, cellSize, cellSize);
                        
                        cell.opacity -= 0.03;
                        if (cell.opacity <= 0) {
                            activeCells.delete(key);
                        }
                    });
                    
                    requestAnimationFrame(updateGridGlow);
                }
                requestAnimationFrame(updateGridGlow);
            }
        });
    </script>
</body>
</html>
